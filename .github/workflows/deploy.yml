name: Deploy Finance App to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build and Deploy using Docker Compose
        run: |
          # Menyalin file .env terpusat dari server ke folder runner jika ada
          cp /home/www/finance-app/.env .env || true
          docker compose down
          docker compose up -d --build

      - name: Refresh Nginx Proxy Manager
        run: docker restart nginx-proxy-manager-app-1
