name: Deploy Finance API and Worker to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Migrate and deploy services
        run: |
          # Copy shared runtime env from the server into the runner workspace
          cp /home/www/finance-app/.env .env || true
          docker compose down
          go run ./cmd/migrate up
          docker compose up -d --build

      - name: Refresh Nginx Proxy Manager
        run: docker restart nginx-proxy-manager-app-1
